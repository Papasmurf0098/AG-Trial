<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift Income Analytics</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
color:#00e0d0;
}

input, textarea, button{
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
border-radius:5px;
border:none;
}

input, textarea{
background:#1c1c1c;
color:white;
border:1px solid #333;
}

button{
background:#00e0d0;
color:black;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#00e0d0;
color:black;
}

td{
border:1px solid #333;
padding:6px;
text-align:center;
}

.deleteBtn{
background:#ff5555;
color:white;
border:none;
padding:5px;
}

.dashboard{
margin-top:20px;
line-height:1.8;
}

.card{
background:#1a1a1a;
padding:10px;
margin:6px 0;
border-left:4px solid #00e0d0;
}

</style>
</head>

<body>

<h1>Shift Income Analytics</h1>

<input type="date" id="date">
<input type="text" id="section" placeholder="Section">
<input type="number" id="hours" placeholder="Hours Worked">
<input type="number" id="tips" placeholder="Tips Earned">
<textarea id="comments" placeholder="Shift comments"></textarea>

<button onclick="addShift()">Add Shift</button>
<button onclick="exportCSV()">Export CSV Backup</button>

<table id="shiftTable">

<tr>
<th>Date</th>
<th>Section</th>
<th>Hours</th>
<th>Tips</th>
<th>$ / Hr</th>
<th>Comments</th>
<th>Delete</th>
</tr>

</table>

<div class="dashboard">

<div class="card">
Total Tips: $<span id="totalTips">0</span>
</div>

<div class="card">
Total Hours: <span id="totalHours">0</span>
</div>

<div class="card">
Overall Hourly Average: $<span id="overallAvg">0</span>
</div>

<div class="card">
Weekly Avg (Fri-Thu): $<span id="weeklyAvg">0</span>
</div>

<div class="card">
Weekly Total Tips: $<span id="weeklyTips">0</span>
</div>

<div class="card">
Projected Weekly Tips: $<span id="projection">0</span>
</div>

<div class="card">
Best Hourly Shift: $<span id="bestShift">0</span>
</div>

<div class="card">
Section Performance:<br>
<span id="sectionStats"></span>
</div>

<div class="card">
Day Performance:<br>
<span id="dayStats"></span>
</div>

</div>

<script>

let shifts = JSON.parse(localStorage.getItem("shiftData")) || []

function saveData(){
localStorage.setItem("shiftData", JSON.stringify(shifts))
}

function addShift(){

let date=document.getElementById("date").value
let section=document.getElementById("section").value
let hours=parseFloat(document.getElementById("hours").value)
let tips=parseFloat(document.getElementById("tips").value)
let comments=document.getElementById("comments").value

if(!date || !section || !hours || !tips){
alert("Fill all fields")
return
}

let hourly=tips/hours

shifts.push({date,section,hours,tips,hourly,comments})

saveData()

renderTable()
calculateStats()

}

function deleteShift(i){

shifts.splice(i,1)

saveData()

renderTable()
calculateStats()

}

function renderTable(){

let table=document.getElementById("shiftTable")

table.innerHTML=`
<tr>
<th>Date</th>
<th>Section</th>
<th>Hours</th>
<th>Tips</th>
<th>$ / Hr</th>
<th>Comments</th>
<th>Delete</th>
</tr>
`

shifts.forEach((s,i)=>{

table.innerHTML+=`
<tr>
<td>${s.date}</td>
<td>${s.section}</td>
<td>${s.hours}</td>
<td>$${s.tips}</td>
<td>$${s.hourly.toFixed(2)}</td>
<td>${s.comments}</td>
<td><button class="deleteBtn" onclick="deleteShift(${i})">X</button></td>
</tr>
`

})

}

function calculateStats(){

let tips=shifts.reduce((sum,s)=>sum+s.tips,0)
let hours=shifts.reduce((sum,s)=>sum+s.hours,0)

document.getElementById("totalTips").innerText=tips.toFixed(2)
document.getElementById("totalHours").innerText=hours.toFixed(2)

let overall=hours?tips/hours:0

document.getElementById("overallAvg").innerText=overall.toFixed(2)

calculateWeekly()
sectionStats()
dayStats()

let best=Math.max(...shifts.map(s=>s.hourly),0)

document.getElementById("bestShift").innerText=best.toFixed(2)

}

function calculateWeekly(){

if(shifts.length===0)return

let latest=shifts[shifts.length-1].date
let start=getWeekStart(latest)

let week=shifts.filter(s=>getWeekStart(s.date)===start)

let tips=week.reduce((sum,s)=>sum+s.tips,0)
let hours=week.reduce((sum,s)=>sum+s.hours,0)

let avg=hours?tips/hours:0

document.getElementById("weeklyAvg").innerText=avg.toFixed(2)
document.getElementById("weeklyTips").innerText=tips.toFixed(2)

let projection=avg*40

document.getElementById("projection").innerText=projection.toFixed(2)

}

function getWeekStart(dateString){

let d=new Date(dateString)

let day=d.getDay()

let diff

if(day>=5){
diff=day-5
}else{
diff=day+2
}

d.setDate(d.getDate()-diff)

return d.toISOString().split("T")[0]

}

function sectionStats(){

let sections={}

shifts.forEach(s=>{

if(!sections[s.section]) sections[s.section]={tips:0,hours:0}

sections[s.section].tips+=s.tips
sections[s.section].hours+=s.hours

})

let output=""

for(let sec in sections){

let avg=sections[sec].tips/sections[sec].hours

output+=`${sec}: $${avg.toFixed(2)} / hr<br>`

}

document.getElementById("sectionStats").innerHTML=output

}

function dayStats(){

let days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

let stats={}

shifts.forEach(s=>{

let d=new Date(s.date).getDay()

let day=days[d]

if(!stats[day]) stats[day]={tips:0,hours:0}

stats[day].tips+=s.tips
stats[day].hours+=s.hours

})

let output=""

for(let d in stats){

let avg=stats[d].tips/stats[d].hours

output+=`${d}: $${avg.toFixed(2)} / hr<br>`

}

document.getElementById("dayStats").innerHTML=output

}

function exportCSV(){

let csv="Date,Section,Hours,Tips,Hourly,Comments\n"

shifts.forEach(s=>{
csv+=`${s.date},${s.section},${s.hours},${s.tips},${s.hourly},${s.comments}\n`
})

let blob=new Blob([csv],{type:"text/csv"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="shift-data.csv"
a.click()

}

renderTable()
calculateStats()

</script>

</body>
</html>
